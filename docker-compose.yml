services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://appuser:123@db:5432/appdb
    volumes:
      - ./backend:/app/backend
      - ./frontend/public:/app/frontend/public:ro
      - /app/backend/node_modules
    working_dir: /app/backend
    command: ["node", "src/server.js"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"   # optional (handy if you want to connect from your host)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pgdata:

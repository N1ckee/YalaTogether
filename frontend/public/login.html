<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Yala Together</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Leaflet (رح نحتاجه لاحقاً) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body class="login-body">

<div class="login-wrapper">

  <div class="login-card">

    <img src="images/lugo yalla.jpeg" class="login-logo" alt="Yala Together Logo">

    <h2>Welcome Back</h2>

    <form action="/auth/login" id="loginForm" method="POST">
      <input type="text" name="identifier" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <div id="errorMessage" class="error hidden"></div> 

      <p class="forgot">
        <a href="customer-support.html">Forgot password?</a>
      </p>
      
      <button type="submit" class="login-btn">Log In</button>
    </form>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const data = {
    identifier: form.elements['identifier'].value.trim(),
    password: form.elements['password'].value
  };
  const response = await fetch(form.action, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(data),
  });
  const errorDiv = document.getElementById('errorMessage');
  if (!response.ok) {
    const result = await response.json();
    errorDiv.textContent = result.error || 'Login failed';
    errorDiv.classList.remove('hidden');
  } else {
    window.location.href = '/dashboard.html'; // or wherever you want to redirect
  }
});
</script>

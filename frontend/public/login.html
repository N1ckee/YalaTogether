<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Yala Together</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Leaflet (رح نحتاجه لاحقاً) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body class="login-body">

<div class="login-wrapper">

  <div class="login-card">

    <img src="images/lugo yalla.jpeg" class="login-logo" alt="Yala Together Logo">

    <h2>Welcome Back</h2>

    <form action="/auth/login" id="loginForm" method="POST">
      <input type="text" name="identifier" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <div id="errorMessage" class="error hidden"></div> 

      <p class="forgot">
        <a href="customer-support.html">Forgot password?</a>
      </p>
      
      <button type="submit" class="login-btn">Log In</button>
    </form>
<script>
const form = document.getElementById('loginForm');
const errorDiv = document.getElementById('errorMessage');

if (form) {
  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    if (errorDiv) {
      errorDiv.textContent = '';
      errorDiv.classList.add('hidden');
    }

    const button = form.querySelector('.login-btn');
    if (button) {
      button.disabled = true;
      button.textContent = 'Logging in...';
    }

    const identifierField = form.elements['identifier'];
    const passwordField = form.elements['password'];
    const identifier = identifierField ? identifierField.value.trim() : '';
    const password = passwordField ? passwordField.value.trim() : '';

    // Validate fields before sending request
    if (!identifier || !password) {
      if (errorDiv) {
        errorDiv.textContent = 'Please enter both username and password.';
        errorDiv.classList.remove('hidden');
      }
      if (!identifier && identifierField) identifierField.focus();
      else if (passwordField) passwordField.focus();
      if (button) {
        button.disabled = false;
        button.textContent = 'Log In';
      }
      return;
    }

    try {
      const response = await fetch(form.action, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ identifier, password }),
      });

      let result = {};
      const contentType = response.headers.get("content-type") || "";
      if (contentType.includes("application/json")) {
        result = await response.json();
      } else {
        result = { error: await response.text() };
      }

      if (!response.ok) {
        throw new Error(result.error || 'Login failed');
      }

      window.location.href = '/dashboard.html';
    } catch (err) {
      if (errorDiv) {
        errorDiv.textContent = err.message || 'Login failed';
        errorDiv.classList.remove('hidden');
      }
      // Clear password field for security
      if (passwordField) passwordField.value = '';
      if (identifierField) identifierField.focus();
    } finally {
      if (button) {
        button.disabled = false;
        button.textContent = 'Log In';
      }
    }
  });
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account - Yala Together</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">
<img src="images/yalla-together.svg" alt="Yala Together" class="form-logo">
<form id="registerForm">

<input type="text" name="firstname" id="firstname" placeholder="Firstname" required>
<input type="text" name="lastname" id="lastname" placeholder="Lastname" required>
<input type="text" name="username" id="username" placeholder="Username" required>
<input type="email" name="email" id="email" placeholder="Email" required>
<input type="tel" name="phonenumber" id="phonenumber" placeholder="Phone Number" required>
<input type="password" name="password" id="password" placeholder="Password" required>
<input type="password" name="confirm_password" id="confirmPassword" placeholder="Confirm Password" required>

<div class="role-options">
<label><input type="checkbox" id="driverRole" value="driver" class="role">Register as a Driver</label>
</div>

<div id="carfields" class="hidden">
<input type="text" id="carNumber" name="carNumber" placeholder="Car Number">
<input type="text" id="carModel" name="carModel" placeholder="Car Model">
<input type="text" id="licenseNumber" name="licenseNumber" placeholder="Driving License Number">
<input type="date" id="licenseDate" name="licenseDate">
<div id="licenseError" class="error"></div>
</div>

<button type="submit">Register</button>

</form>
</div>
    
<script>
// Driver option
document.addEventListener('DOMContentLoaded', function() {
  const driverRole = document.getElementById('driverRole');
  const carfields = document.getElementById('carfields');
  const registerForm = document.getElementById('registerForm');
  const licenseError = document.getElementById('licenseError');
  const licenseDate = document.getElementById('licenseDate');

  driverRole.addEventListener('change', () => {
    carfields.classList.toggle('hidden', !driverRole.checked);
  });

  // Initialize display on page load
  carfields.classList.toggle('hidden', !driverRole.checked);

  registerForm.addEventListener('submit', function (e) {
    e.preventDefault();

    if (licenseError) licenseError.textContent = "";

    const firstname = registerForm.elements['firstname'].value.trim();
    const lastname = registerForm.elements['lastname'].value.trim();
    const username = registerForm.elements['username'].value.trim();
    const email = registerForm.elements['email'].value.trim();
    const phonenumber = registerForm.elements['phonenumber'].value.trim();
    const password = registerForm.elements['password'].value;
    const confirm_password = registerForm.elements['confirm_password'].value;
    const is_driver = driverRole.checked;

    if (password !== confirm_password) {
      alert("Passwords do not match");
      return;
    }

    const strongPassword = /^(?=.*[A-Za-z])(?=.*\d).{6,}$/;
    if (!strongPassword.test(password)) {
      alert("Password must be at least 6 characters, contain at least one letter and one number.");
      return;
    }

    const phoneRegex = /^[0-9]{7,15}$/;
    if (!phoneRegex.test(phonenumber)) {
      alert("Invalid phone number");
      return;
    }

    // only validate license if driver role is selected
    if (is_driver) {
      if (!licenseDate.value) {
        if (licenseError) licenseError.textContent = "Please enter your license issue date";
        return;
      }
      const selectedDate = new Date(licenseDate.value);
      const today = new Date();
      // calculate full years difference
      let years = today.getFullYear() - selectedDate.getFullYear();
      const m = today.getMonth() - selectedDate.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < selectedDate.getDate())) {
        years--;
      }
      if (years < 2) {
        if (licenseError) licenseError.textContent = "License rejected: less than 2 years";
        return;
      }
      if (licenseError) licenseError.textContent = "";
    }

    const userdata = {
      firstname,
      lastname,
      username,
      email,
      phonenumber,
      password
    };

    // add car and license fields if driver role is selected
    if (is_driver) {
      userdata.carNumber = registerForm.elements['carNumber'].value;
      userdata.carModel = registerForm.elements['carModel'].value;
      userdata.licenseNumber = registerForm.elements['licenseNumber'].value;
      userdata.licenseDate = licenseDate.value;
      userdata.is_driver = true;
    }

    fetch("/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(userdata)
    })
    .then(async res => {
      let data = {};
      try {
        data = await res.json();
      } catch {
        // if response is not json, keep data as empty object
      }
      if (!res.ok) {
        throw new Error(data.error || "Registration failed");
      }
      return data;
    })
    .then(data => {
      alert("Registration successful!");
      window.location.href = "login.html";
    })
    .catch(err => {
      console.error(err);
      // Show error in licenseError if driver, otherwise alert
      if (is_driver && licenseError) {
        licenseError.textContent = err.message || "Registration failed";
      } else {
        alert(err.message || "Registration failed");
      }
    });
  });
});
</script>
</script>
   
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account - Yala Together</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<img src="images/yalla-together.svg" alt="Yala Together" class="form-logo">
<form id="registerForm">

<input type="text" name="firstname" placeholder="Firstname">
<input type="text" name="lastname" placeholder="Lastname">
<input type="text" id="username" placeholder="Username" required>
<input type="email" id="email" placeholder="Email" required>
<input type="tel" id="phonenumber" placeholder="Phone Number" required>
<input type="password" id="password" placeholder="Password" required>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<div class="role-options">
<label><input type="checkbox" value="driver" class="role"> Driver</label>
</div>

<div id="carFields" class="hidden">
<input type="text" id="carNumber" placeholder="Car Number">
<input type="text" id="carModel" placeholder="Car Model">
<input type="text" id="licenseNumber" placeholder="Driving License Number">
<input type="date" id="licenseDate">
<div id="licenseError" class="error"></div>
</div>

<button type="submit">Register</button>

</form>
</div>
    
<script>
const roles = document.querySelectorAll('.role');
const carFields = document.getElementById('carFields');
const form = document.getElementById('registerForm');
const licenseDate = document.getElementById('licenseDate');
const licenseError = document.getElementById('licenseError');

roles.forEach(role => {
  role.addEventListener('change', () => {
    const driverChecked = [...roles].some(r => r.value === 'driver' && r.checked);
    if (driverChecked) {
      carFields.classList.remove('hidden');
    } else {
      carFields.classList.add('hidden');
      if (licenseError) licenseError.textContent = "";
    }
  });
});

form.addEventListener('submit', function (e) {
  e.preventDefault();

  if (licenseError) licenseError.textContent = "";

  const firstname = document.querySelector('[name="firstname"]').value.trim();
  const lastname = document.querySelector('[name="lastname"]').value.trim();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phonenumber').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  const selectedRoles = [...roles]
    .filter(r => r.checked)
    .map(r => r.value);

  if (selectedRoles.length === 0) {
    alert("Please select at least one role");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  const strongPassword = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$/;
  if (!strongPassword.test(password)) {
    alert("Password must contain letters and numbers (min 6 characters)");
    return;
  }

  const phoneRegex = /^[0-9]{7,15}$/;
  if (!phoneRegex.test(phone)) {
    alert("Invalid phone number");
    return;
  }

  // Only validate license if driver role is selected
  if (selectedRoles.includes('driver')) {
    if (!licenseDate.value) {
      if (licenseError) licenseError.textContent = "Please enter your license issue date";
      return;
    }
    const selectedDate = new Date(licenseDate.value);
    const today = new Date();
    // Calculate full years difference
    let years = today.getFullYear() - selectedDate.getFullYear();
    const m = today.getMonth() - selectedDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < selectedDate.getDate())) {
      years--;
    }
    if (years < 2) {
      if (licenseError) licenseError.textContent = "License rejected: less than 2 years";
      return;
    }
    if (licenseError) licenseError.textContent = "";
  }

  const userData = {
    firstname,
    lastname,
    username,
    email,
    phone,
    password,
    roles: selectedRoles
  };

  // Add licenseDate if driver role is selected
  if (selectedRoles.includes('driver')) {
    userData.licenseDate = licenseDate.value;
  }

  fetch("/auth/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(userData)
  })
  .then(async res => {
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || "Registration failed");
    }
    return data;
  })
  .then(data => {
    alert("Registration successful!");
    window.location.href = "login.html";
  })
  .catch(err => {
    console.error(err);
    if (licenseError) licenseError.textContent = err.message;
  });
});
</script>
   
</body>
</html>

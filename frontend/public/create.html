<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account - Yala Together</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<img src="images/yalla-together.svg" alt="Yala Together" class="form-logo">
<form id="registerForm">

<input type="text" name="firstname" placeholder="Firstname">
<input type="text" name="lastname" placeholder="Lastname">
<input type="text" name="username" id="username" placeholder="Username" required>
<input type="email" name="email" id="email" placeholder="Email" required>
<input type="tel" name="phonenumber" id="phonenumber" placeholder="Phone Number" required>
<input type="password" name="password" id="password" placeholder="Password" required>
<input type="password" name="confirm_password" id="confirmPassword" placeholder="Confirm Password" required>

<div class="role-options">
<label><input type="checkbox" id="driverRole" value="driver" class="role">Register as a Driver</label>
</div>

<div id="carfields" class="hidden">
<input type="text" id="carNumber" placeholder="Car Number">
<input type="text" id="carModel" placeholder="Car Model">
<input type="text" id="licenseNumber" placeholder="Driving License Number">
<input type="date" id="licenseDate">
<div id="licenseError" class="error"></div>
</div>

<button type="submit">Register</button>

</form>
</div>
    
<script>
// Driver option
document.addEventListener('DOMContentLoaded', function() {
  const driverRole = document.getElementById('driverRole');
  const carfields = document.getElementById('carfields');

  driverRole.addEventListener('change', () => {
    carfields.classList.toggle('hidden', !driverRole.checked);
  });

  // Initialize display on page load
  carfields.classList.toggle('hidden', !driverRole.checked);
});

form.addeventlistener('submit', function (e) {
  e.preventdefault();

  if (licenseerror) licenseerror.textcontent = "";


  const form = document.queryselector('form');

  const firstname = form.elements['firstname'].value.trim();
  const lastname = form.elements['lastname'].value.trim();
  const username = form.elements['username'].value.trim();
  const email = form.elements['email'].value.trim();
  const phonenumber = form.elements['phonenumber'].value.trim();
  const password = form.elements['password'].value;
  const confirm_password = form.elements['confirmpassword'].value;
  const is_driver = document.getelementbyid('driver').checked;


  if (password !== confirm_password) {
    alert("passwords do not match");
    return;
  }

  const strongpassword = /^(?=.*[a-za-z])(?=.*\d)[a-za-z\d]{6,}$/;
  if (!strongpassword.test(password)) {
    alert("password must contain letters and numbers (min 6 characters)");
    return;
  }

  const phoneregex = /^[0-9]{7,15}$/;
  if (!phoneregex.test(phonenumber)) {
    alert("invalid phone number");
    return;
  }

  // only validate license if driver role is selected
  if (is_driver) {
    if (!licensedate.value) {
      if (licenseerror) licenseerror.textcontent = "please enter your license issue date";
      return;
    }
    const selecteddate = new date(licensedate.value);
    const today = new date();
    // calculate full years difference
    let years = today.getfullyear() - selecteddate.getfullyear();
    const m = today.getmonth() - selecteddate.getmonth();
    if (m < 0 || (m === 0 && today.getdate() < selecteddate.getdate())) {
      years--;
    }
    if (years < 2) {
      if (licenseerror) licenseerror.textcontent = "license rejected: less than 2 years";
      return;
    }
    if (licenseerror) licenseerror.textcontent = "";
  }

  const userdata = {
    firstname,
    lastname,
    username,
    email,
    phonenumber,
    password,
    confirm_password
  };

  // add licensedate if driver role is selected
  if (is_driver) {
    userdata.licensedate = licensedate.value;
  }

  fetch("/auth/register", {
    method: "post",
    headers: {
      "content-type": "application/json"
    },
    body: json.stringify(userdata)
  })
.then(async res => {
  let data = {};
  try {
    data = await res.json();
  } catch {
    // if response is not json, keep data as empty object
  }
  if (!res.ok) {
    throw new error(data.error || "registration failed");
  }
  return data;
})
.then(data => {
  alert("registration successful!");
  window.location.href = "login.html";
})
.catch(err => {
  console.error(err);
  if (licenseerror) licenseerror.textcontent = err.message || "registration failed";
});
});
</script>
   
</body>
</html>
